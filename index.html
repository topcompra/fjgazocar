<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Francisco Gonzalez</title>

        <style>
            :root {
                --bg: #f9f9f9;
                --card: #ffffff;
                --text: #111;
                --muted: #777;
                --border: rgba(0, 0, 0, 0.08);
                --shadow: rgba(0, 0, 0, 0.18);
                --hover: rgba(0, 0, 0, 0.04);
            }

            [data-theme="dark"] {
                --bg: #0f0f0f;
                --card: #171717;
                --text: #f2f2f2;
                --muted: #666;
                --border: rgba(255, 255, 255, 0.08);
                --shadow: rgba(0, 0, 0, 0.6);
                --hover: rgba(255, 255, 255, 0.05);
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                background: var(--bg);
                color: var(--text);
                font-family: Arial, sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .toggle-theme {
                position: fixed;
                top: 18px;
                right: 18px;
                cursor: pointer;
                font-size: 20px;
                padding: 8px;
                border-radius: 50%;
                background: var(--card);
                box-shadow: 0 2px 8px var(--shadow);
                user-select: none;
                z-index: 20;
            }

            .card {
                position: relative;
                width: min(92vw, 620px);
                background: var(--card);
                border-radius: 12px;
                box-shadow: 0 0 22px var(--shadow);
                overflow: hidden;
            }

            .brand-mark {
                position: absolute;
                top: 17px;
                right: 20px;
                width: 34px;
                height: 34px;
                opacity: 0.9;
                z-index: 5;
            }

            .brand-mark img {
                width: 120%;
                height: 120%;
                transform: rotate(180deg);
            }

            .identity-top {
                padding: 18px 72px 12px 72px;
                text-align: center;
                border-bottom: 1px solid var(--border);
            }

            .identity-top h1 {
                font-size: 1rem;
                font-weight: 700;
                letter-spacing: -0.01em;
                margin-bottom: 7px;
            }

            .identity-links {
                display: flex;
                justify-content: center;
                gap: 14px;
                flex-wrap: wrap;
                font-size: 0.76rem;
            }

            a {
                color: var(--text);
                text-decoration: none;
                transition: opacity 0.2s;
            }

            a:hover {
                opacity: 0.58;
            }

            .hero {
                padding: 22px 26px 16px;
                border-bottom: 1px solid var(--border);
            }

            .hero-label {
                text-align: center;
                font-size: 0.6rem;
                text-transform: uppercase;
                letter-spacing: 0.14em;
                color: var(--muted);
                margin-bottom: 8px;
            }

            .hero-title {
                text-align: center;
                font-size: 1.35rem;
                font-weight: 800;
                line-height: 1.18;
                letter-spacing: -0.03em;
                margin-bottom: 8px;
            }

            .hero-specs {
                display: flex;
                justify-content: center;
                gap: 16px;
                flex-wrap: wrap;
                font-size: 0.74rem;
                color: var(--muted);
                margin-bottom: 16px;
            }

            .hero-specs strong {
                color: var(--text);
                font-weight: 700;
            }

            .video-slot {
                width: 100%;
                aspect-ratio: 16 / 9;
                background: var(--hover);
                border: 1px solid var(--border);
                border-radius: 8px;
                overflow: hidden;
                position: relative;
                cursor: pointer;
            }

            .video-slot iframe,
            .video-slot video {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                border: none;
                object-fit: cover;

                /* crop bottom (hide OS bar) */
                transform: scale(1.06);
                transform-origin: top;
            }

            .vid-cover {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                transition: background 0.2s;
            }

            .vid-cover:hover {
                background: rgba(0, 0, 0, 0.035);
            }

            .play-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: var(--card);
                border: 1px solid var(--border);
                box-shadow: 0 2px 8px var(--shadow);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                flex-shrink: 0;
            }

            .vid-cover span {
                font-size: 0.76rem;
                color: var(--muted);
            }

            .proof {
                padding: 13px 24px;
                border-bottom: 1px solid var(--border);
                text-align: center;
                font-size: 0.76rem;
                color: var(--muted);
                line-height: 1.45;
            }

            .proof strong {
                color: var(--text);
                font-weight: 650;
            }

            .contact-strip {
                padding: 13px 24px 15px;
                display: flex;
                justify-content: center;
                gap: 16px;
                flex-wrap: wrap;
                font-size: 0.78rem;
            }

            @media (max-height: 720px) {
                .identity-top {
                    padding-top: 14px;
                    padding-bottom: 10px;
                }

                .hero {
                    padding: 18px 22px 13px;
                }

                .hero-title {
                    font-size: 1.2rem;
                }

                .proof {
                    padding: 10px 22px;
                }

                .contact-strip {
                    padding: 10px 22px 12px;
                }
            }

            @media (max-width: 520px) {
                .brand-mark {
                    width: 30px;
                    height: 30px;
                    top: 14px;
                    right: 14px;
                }

                .identity-top {
                    padding-left: 48px;
                    padding-right: 48px;
                }

                .hero-specs {
                    gap: 10px;
                }

                .identity-links,
                .contact-strip {
                    gap: 10px;
                }
            }
        </style>
    </head>

    <body data-theme="dark">
        <div class="toggle-theme" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
        </div>

        <main class="card">
            <a
                class="brand-mark"
                href="https://www.linkedin.com/in/fjgazocar/"
                aria-label="Francisco Gonzalez LinkedIn"
            >
                <img id="brand-icon" src="images/ai_chip_dark.svg" alt="FJ" />
            </a>

            <section class="identity-top">
                <h1>Francisco Gonzalez</h1>

                <div class="identity-links">
                    <a
                        href="https://www.linkedin.com/in/fjgazocar/"
                        target="_blank"
                        >LinkedIn</a
                    >
                    <a href="mailto:fjgazocar@gmail.com">Email</a>
                    <a href="francisco_gonzalez_resume.pdf" target="_blank"
                        >Resume</a
                    >
                    <a href="https://github.com/topcompra" target="_blank"
                        >GitHub</a
                    >
                    <a href="tel:+18574069077">857-406-9077</a>
                </div>
            </section>

            <section class="hero">
                <div class="hero-label">featured system</div>

                <div class="hero-title">Real-Time Market Data Engine</div>

                <div class="hero-specs">
                    <div><strong>16ms</strong> frame budget</div>
                    <div><strong>~120 FPS</strong> peak</div>
                    <div><strong>ZMQ</strong> streaming</div>
                </div>

                <div class="video-slot">
                    <video controls autoplay muted loop>
                        <source src="chart_presentation.mp4" type="video/mp4" />
                    </video>
                </div>
            </section>

            <section class="proof">
                <strong>Tick-level ingestion</strong> →
                <strong>ZMQ live feed</strong> →
                <strong>real-time rasterized analytics UI</strong>
            </section>

            <section class="contact-strip">
                <a href="mailto:fjgazocar@gmail.com">Contact</a>
                <a href="francisco_gonzalez_resume.pdf" target="_blank"
                    >View Resume</a
                >
                <a href="https://github.com/topcompra" target="_blank"
                    >GitHub</a
                >
                <a href="https://www.linkedin.com/in/fjgazocar/" target="_blank"
                    >LinkedIn</a
                >
            </section>
        </main>

        <script>
            const saved = localStorage.getItem("theme") || "dark";
            document.body.setAttribute("data-theme", saved);
            updateThemeUI(saved);

            function toggleTheme() {
                const next =
                    document.body.getAttribute("data-theme") === "light"
                        ? "dark"
                        : "light";

                document.body.setAttribute("data-theme", next);
                localStorage.setItem("theme", next);
                updateThemeUI(next);
            }

            function updateThemeUI(theme) {
                document.getElementById("theme-icon").textContent =
                    theme === "light" ? "🌙" : "☀️";

                const brandIcon = document.getElementById("brand-icon");
                if (brandIcon) {
                    brandIcon.src =
                        theme === "light"
                            ? "images/ai_chip_light.svg"
                            : "images/ai_chip_dark.svg";
                }
            }
        </script>
    </body>
</html>
